<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Queue Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f5f6fa;
      --surface: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --primary: #5c67f2;
      --primary-light: #eef0ff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      padding: 40px 24px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 1200px;
    }

    /* --- Header / Title Area --- */
    h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
    }

    .subtitle span {
      color: var(--text-main);
      font-weight: 600;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 8px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* --- Core Metrics Grid --- */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 32px;
    }

    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.015);
      border: 1px solid #f1f5f9;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .card-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--text-main);
    }

    /* Status-dependent dynamic text colors matching original code logic */
    .card-value.good { color: var(--success); }
    .card-value.warn { color: var(--warning); }
    .card-value.danger { color: var(--danger); }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* --- Workers Section (Structured like "Most Ordered Food") --- */
    .workers-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }

    .worker-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.015);
      border: 1px solid #f1f5f9;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .worker-profile {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .worker-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary-light);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
    }

    .worker-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
    }

    .worker-pending {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      background: #f1f5f9;
      padding: 6px 12px;
      border-radius: 20px;
    }

    .worker-pending.has-pending {
      color: var(--warning);
      background: #fef3c7;
    }

    /* --- History Log --- */
    .history {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.015);
      border: 1px solid #f1f5f9;
    }

    .history-list {
      list-style: none;
      max-height: 220px;
      overflow-y: auto;
    }

    .history-list::-webkit-scrollbar {
      width: 4px;
    }
    
    .history-list::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .history-item {
      font-size: 13px;
      color: var(--text-muted);
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .history-item:last-child { border-bottom: none; }

    .history-time {
      font-family: monospace;
      font-weight: 600;
      color: var(--text-main);
      background: #f1f5f9;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>⚡ Message Queue Dashboard</h1>
    <p class="subtitle">
      <span class="status-dot"></span>
      Live — refreshing every <span>1s</span> &nbsp;|&nbsp; Last updated: <span id="lastUpdated">—</span>
    </p>

    <div class="grid">
      <div class="card">
        <div class="card-label">Queue Depth</div>
        <div class="card-value" id="queueDepth">—</div>
      </div>
      <div class="card">
        <div class="card-label">Pending (Unacked)</div>
        <div class="card-value warn" id="pendingCount">—</div>
      </div>
      <div class="card">
        <div class="card-label">Dead Letter Queue</div>
        <div class="card-value danger" id="dlqDepth">—</div>
      </div>
    </div>

    <p class="section-title">Per Worker — Pending Jobs</p>
    <div class="workers-grid" id="workersGrid">
      <div class="worker-card">
        <div class="worker-profile">
          <div class="worker-avatar">...</div>
          <span class="worker-name">Waiting...</span>
        </div>
        <span class="worker-pending">—</span>
      </div>
    </div>

    <p class="section-title">Poll History</p>
    <div class="history">
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>

<script>
  const KNOWN_WORKERS = ['worker-1', 'worker-2', 'worker-3'];

  async function fetchMetrics() {
    try {
      const res = await fetch('/metrics');
      const data = await res.json();

      // Update core cards
      document.getElementById('queueDepth').textContent = data.queue.depth;
      document.getElementById('pendingCount').textContent = data.queue.pending;
      document.getElementById('dlqDepth').textContent = data.dlq.depth;
      document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();

      // Dynamically color queue depth based on scale threshold
      const qd = document.getElementById('queueDepth');
      qd.className = 'card-value ' + (data.queue.depth > 500 ? 'warn' : 'good');

      // Update worker cards with photo-style clean list aesthetics
      const grid = document.getElementById('workersGrid');
      grid.innerHTML = KNOWN_WORKERS.map((w, idx) => {
        const pending = data.workers[w] || 0;
        return `
          <div class="worker-card">
            <div class="worker-profile">
              <div class="worker-avatar">W${idx + 1}</div>
              <span class="worker-name">${w}</span>
            </div>
            <span class="worker-pending ${pending > 0 ? 'has-pending' : ''}">${pending} jobs</span>
          </div>`;
      }).join('');

      // Add entry to scrollable history log
      const list = document.getElementById('historyList');
      const item = document.createElement('li');
      item.className = 'history-item';
      
      const timeStr = new Date().toLocaleTimeString([], { hour12: false });
      item.innerHTML = `
        <span class="history-time">${timeStr}</span>
        <span>depth=<strong>${data.queue.depth}</strong> pending=<strong>${data.queue.pending}</strong> dlq=<strong>${data.dlq.depth}</strong></span>
      `;
      list.prepend(item);

      // Enforce historical max limit constraints
      while (list.children.length > 20) list.removeChild(list.lastChild);

    } catch (err) {
      console.error('Failed to fetch metrics:', err);
    }
  }

  fetchMetrics();
  setInterval(fetchMetrics, 1000);
</script>
</body>
</html>
